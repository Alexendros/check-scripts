# ═══════════════════════════════════════════════════════════════════════════════
# post-merge · xek-cluster · piloto
#
# Apunta a be5a8dd (PR #20 plantillas) pinned. Infra/Docker.
# enable_release=false (xek-cluster es infra, no se publica como artifact).
# ═══════════════════════════════════════════════════════════════════════════════

name: post-merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  attestations: write
  checks: write
  packages: write
  security-events: write

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    uses: Alexendros/plantillas/.github/workflows/_lib-post-merge.yml@be5a8dd
    with:
      enable_linters: true
      enable_sbom: true
      enable_attest: true
      enable_release: false      # infra · no aplica release-please
    secrets: inherit
